<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="雨戸の戸袋の下にたまるコウモリの糞と衛生リスクのイラスト">
  <rect width="800" height="340" fill="#f2e4cc"/>
  <!-- 雨戸の戸袋 -->
  <rect x="80" y="40" width="300" height="150" rx="10" fill="#8d7a5f"/>
  <rect x="96" y="56" width="268" height="118" rx="6" fill="#6d5a44"/>
  <g stroke="#8d7a5f" stroke-width="5">
    <line x1="130" y1="56" x2="130" y2="174"/><line x1="180" y1="56" x2="180" y2="174"/>
    <line x1="230" y1="56" x2="230" y2="174"/><line x1="280" y1="56" x2="280" y2="174"/><line x1="330" y1="56" x2="330" y2="174"/>
  </g>
  <!-- 隙間のコウモリ -->
  <g fill="#241f33">
    <path d="M330 186 q8 -10 17 -6 q3 -8 10 -8 q8 0 10 8 q10 -4 17 6 q-12 -1 -16 4 q-4 -6 -11 -6 q-7 0 -11 6 q-4 -5 -16 -4 z"/>
  </g>
  <!-- 糞の堆積 -->
  <g fill="#4a3b2f">
    <path d="M150 300 q34 -30 70 -30 q40 0 72 30 z"/>
    <ellipse cx="136" cy="298" rx="10" ry="4.5"/>
    <ellipse cx="304" cy="296" rx="11" ry="5"/>
    <ellipse cx="252" cy="252" rx="4" ry="7" transform="rotate(14 252 252)"/>
    <ellipse cx="216" cy="228" rx="4" ry="7" transform="rotate(-12 216 228)"/>
  </g>
  <!-- ダニ・カビの点々 -->
  <g fill="#8fae72">
    <circle cx="180" cy="272" r="4"/><circle cx="240" cy="284" r="4"/><circle cx="286" cy="272" r="4"/>
  </g>
  <!-- 臭い立ちのぼり -->
  <g stroke="#8fae72" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M190 236 q10 -12 0 -24 q-10 -12 0 -24"/>
    <path d="M232 244 q10 -12 0 -24 q-10 -12 0 -24"/>
    <path d="M274 236 q10 -12 0 -24 q-10 -12 0 -24"/>
  </g>
  <!-- 天井のシミ（右側の室内カット） -->
  <g>
    <rect x="470" y="40" width="270" height="150" rx="10" fill="#fdf6ec"/>
    <rect x="470" y="40" width="270" height="18" fill="#e8dcc8"/>
    <path d="M560 58 q30 34 76 22 q30 -8 40 -22 z" fill="#c9b88f" opacity="0.85"/>
    <path d="M580 60 q22 22 52 16" stroke="#b3a077" stroke-width="4" fill="none" opacity="0.7"/>
  </g>
  <!-- 警告サイン -->
  <g>
    <polygon points="640,220 706,320 574,320 " fill="#ffcc4d" stroke="#e6a817" stroke-width="5" stroke-linejoin="round"/>
    <rect x="634" y="252" width="12" height="34" rx="6" fill="#5a4638"/>
    <circle cx="640" cy="302" r="7" fill="#5a4638"/>
  </g>
  <!-- 地面 -->
  <rect y="300" width="800" height="40" fill="#d9c9ad"/>
</svg>
