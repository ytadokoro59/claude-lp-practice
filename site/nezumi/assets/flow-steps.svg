<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="相談から現地調査までの3ステップ図">
  <rect width="800" height="340" fill="#eef4ee"/>
  <!-- カード1：問い合わせ -->
  <g>
    <rect x="36" y="70" width="220" height="220" rx="18" fill="#ffffff" stroke="#d8e2d9" stroke-width="2"/>
    <circle cx="146" cy="70" r="26" fill="#2f6f4f"/>
    <text x="146" y="80" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff">1</text>
    <!-- スマホ＋吹き出し -->
    <rect x="106" y="120" width="80" height="130" rx="12" fill="#3a3230"/>
    <rect x="114" y="132" width="64" height="98" rx="6" fill="#dff0e6"/>
    <rect x="122" y="146" width="48" height="10" rx="5" fill="#7fa88f"/>
    <rect x="122" y="164" width="48" height="10" rx="5" fill="#7fa88f"/>
    <rect x="122" y="182" width="32" height="10" rx="5" fill="#7fa88f"/>
    <rect x="126" y="204" width="40" height="16" rx="8" fill="#ff7a30"/>
    <circle cx="196" cy="120" r="20" fill="#ffb85c"/>
    <path d="M188 120 h16 M196 112 v16" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 矢印 -->
  <path d="M268 180 l30 0 m-10 -12 l12 12 l-12 12" stroke="#4f8f6b" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- カード2：日程調整 -->
  <g>
    <rect x="310" y="70" width="220" height="220" rx="18" fill="#ffffff" stroke="#d8e2d9" stroke-width="2"/>
    <circle cx="420" cy="70" r="26" fill="#2f6f4f"/>
    <text x="420" y="80" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff">2</text>
    <!-- カレンダー -->
    <rect x="360" y="126" width="120" height="110" rx="10" fill="#fffdf6" stroke="#d8e2d9" stroke-width="2"/>
    <rect x="360" y="126" width="120" height="28" rx="10" fill="#c96f4a"/>
    <rect x="378" y="114" width="10" height="24" rx="5" fill="#8d6748"/>
    <rect x="452" y="114" width="10" height="24" rx="5" fill="#8d6748"/>
    <g fill="#e8dcc8">
      <rect x="374" y="166" width="20" height="16" rx="3"/><rect x="410" y="166" width="20" height="16" rx="3"/><rect x="446" y="166" width="20" height="16" rx="3"/>
      <rect x="374" y="192" width="20" height="16" rx="3"/><rect x="446" y="192" width="20" height="16" rx="3"/>
    </g>
    <rect x="408" y="190" width="24" height="20" rx="4" fill="#ff7a30"/>
    <path d="M413 200 l5 5 l9 -11" stroke="#ffffff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- 矢印 -->
  <path d="M542 180 l30 0 m-10 -12 l12 12 l-12 12" stroke="#4f8f6b" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- カード3：現地調査0円 -->
  <g>
    <rect x="584" y="70" width="220" height="220" rx="18" fill="#ffffff" stroke="#d8e2d9" stroke-width="2"/>
    <circle cx="694" cy="70" r="26" fill="#2f6f4f"/>
    <text x="694" y="80" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff">3</text>
    <!-- 家＋虫めがね -->
    <polygon points="640,166 694,124 748,166" fill="#c96f4a"/>
    <rect x="652" y="166" width="84" height="62" rx="6" fill="#fdf6ec" stroke="#e0d0b8" stroke-width="2"/>
    <rect x="682" y="190" width="24" height="38" rx="4" fill="#8d6748"/>
    <circle cx="732" cy="196" r="30" fill="#dff0e6" stroke="#2f6f4f" stroke-width="7"/>
    <line x1="752" y1="220" x2="774" y2="244" stroke="#2f6f4f" stroke-width="10" stroke-linecap="round"/>
    <!-- 0円タグ -->
    <g transform="rotate(-8 636 246)">
      <rect x="600" y="230" width="76" height="34" rx="8" fill="#ff7a30"/>
      <text x="638" y="254" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#ffffff">0円</text>
    </g>
  </g>
</svg>
