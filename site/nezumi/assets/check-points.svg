    <line x1="44" y1="33" x2="92" y2="33" stroke="#cfe3d5" stroke-width="4" stroke-linecap="round"/>
    <path d="M16 60 l6 6 12 -13" stroke="#2f6f4f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
