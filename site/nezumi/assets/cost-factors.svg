<svg viewBox="0 0 400 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="費用が変わる要因をイメージしたイラスト">
  <defs>
    <linearGradient id="costBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ee"/>
      <stop offset="100%" stop-color="#dff0e6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="170" rx="16" fill="url(#costBg)"/>

  <!-- house -->
  <polygon points="140,120 200,72 260,120" fill="#fdf6ec" stroke="#d8cdb8" stroke-width="4"/>
  <rect x="155" y="120" width="90" height="32" fill="#ffffff" stroke="#d8cdb8" stroke-width="4"/>

  <!-- dashed connector lines -->
  <g stroke="#a9c2b3" stroke-width="2.5" stroke-dasharray="4 4" fill="none">
    <path d="M150 100 L90 60"/>
    <path d="M250 100 L320 60"/>
    <path d="M200 120 L200 150"/>
  </g>

  <!-- tag: location -->
  <g transform="translate(58,30)">
    <circle cx="22" cy="22" r="22" fill="#ffffff" stroke="#2f6f4f" stroke-width="3"/>
    <path d="M22 12 a8 8 0 0 1 8 8 c0 6 -8 13 -8 13 s-8 -7 -8 -13 a8 8 0 0 1 8 -8 z" fill="#2f6f4f"/>
    <circle cx="22" cy="20" r="3" fill="#ffffff"/>
  </g>

  <!-- tag: cleaning -->
  <g transform="translate(296,30)">
    <circle cx="22" cy="22" r="22" fill="#ffffff" stroke="#2f6f4f" stroke-width="3"/>
    <g transform="translate(10,8) rotate(15)">
      <rect x="6" y="0" width="6" height="18" rx="3" fill="#a9c2b3"/>
      <path d="M0 18 h18 l-3 8 h-12 z" fill="#2f6f4f"/>
    </g>
  </g>

  <!-- tag: entry points -->
  <g transform="translate(176,140)">
    <circle cx="22" cy="20" r="20" fill="#ffffff" stroke="#ff7a30" stroke-width="3"/>
    <rect x="14" y="12" width="16" height="16" rx="2" fill="none" stroke="#ff7a30" stroke-width="3"/>
    <line x1="14" y1="20" x2="30" y2="20" stroke="#ff7a30" stroke-width="3"/>
  </g>
</svg>
