<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="作業服のスタッフが屋根裏を点検しているイラスト">
  <rect width="800" height="340" fill="#fdf6ec"/>
  <!-- 天井と点検口 -->
  <rect width="800" height="60" fill="#e8dcc8"/>
  <rect x="470" y="8" width="150" height="44" rx="6" fill="#4a3b33"/>
  <rect x="462" y="0" width="166" height="12" fill="#d4c4a8"/>
  <rect x="462" y="48" width="166" height="12" fill="#d4c4a8"/>
  <!-- 覗くネズミ -->
  <g fill="#2e2823">
    <ellipse cx="580" cy="34" rx="14" ry="8"/>
    <circle cx="595" cy="29" r="6"/>
    <circle cx="598" cy="24" r="3"/>
  </g>
  <!-- ライトの光（点検口へ） -->
  <polygon points="352,120 470,16 496,56 372,146" fill="#ffe9b8" opacity="0.75"/>
  <!-- はしご -->
  <g stroke="#b98a5f" stroke-width="10" stroke-linecap="round">
    <line x1="560" y1="56" x2="530" y2="316"/>
    <line x1="650" y1="56" x2="680" y2="316"/>
  </g>
  <g stroke="#b98a5f" stroke-width="8" stroke-linecap="round">
    <line x1="554" y1="110" x2="656" y2="110"/>
    <line x1="548" y1="164" x2="662" y2="164"/>
    <line x1="542" y1="218" x2="668" y2="218"/>
    <line x1="536" y1="272" x2="674" y2="272"/>
  </g>
  <!-- 床 -->
  <rect y="316" width="800" height="24" fill="#e8dcc8"/>
  <!-- スタッフ -->
  <g>
    <!-- 脚 -->
    <rect x="228" y="250" width="26" height="66" rx="10" fill="#3f5d4c"/>
    <rect x="268" y="250" width="26" height="66" rx="10" fill="#35503f"/>
    <rect x="222" y="306" width="38" height="14" rx="7" fill="#3a3230"/>
    <rect x="264" y="306" width="38" height="14" rx="7" fill="#3a3230"/>
    <!-- 胴（作業服） -->
    <rect x="214" y="152" width="94" height="106" rx="26" fill="#2f6f4f"/>
    <rect x="214" y="198" width="94" height="14" fill="#255a3f"/>
    <rect x="228" y="170" width="26" height="16" rx="3" fill="#fffdf6"/>
    <!-- 左腕（クリップボード） -->
    <line x1="220" y1="172" x2="200" y2="236" stroke="#2f6f4f" stroke-width="22" stroke-linecap="round"/>
    <circle cx="199" cy="240" r="10" fill="#f2c9a4"/>
    <rect x="164" y="230" width="58" height="76" rx="8" fill="#c99a6b"/>
    <rect x="184" y="224" width="18" height="10" rx="4" fill="#8d6748"/>
    <rect x="174" y="248" width="38" height="7" rx="3.5" fill="#fffdf6"/>
    <rect x="174" y="264" width="38" height="7" rx="3.5" fill="#fffdf6"/>
    <rect x="174" y="280" width="26" height="7" rx="3.5" fill="#fffdf6"/>
    <!-- 右腕（懐中電灯を上へ） -->
    <line x1="300" y1="172" x2="338" y2="120" stroke="#2f6f4f" stroke-width="22" stroke-linecap="round"/>
    <circle cx="340" cy="117" r="10" fill="#f2c9a4"/>
    <g transform="rotate(-38 348 110)">
      <rect x="326" y="99" width="44" height="20" rx="8" fill="#5b6b5e"/>
      <rect x="366" y="95" width="10" height="28" rx="4" fill="#3a3230"/>
    </g>
    <!-- 頭 -->
    <circle cx="261" cy="112" r="30" fill="#f2c9a4"/>
    <path d="M231 112 a30 30 0 0 1 60 0 z" fill="#3a3230" transform="translate(0,-14)"/>
    <!-- キャップ -->
    <path d="M231 96 q6 -28 30 -28 q24 0 30 28 z" fill="#234f38"/>
    <rect x="255" y="88" width="44" height="12" rx="6" fill="#234f38"/>
    <circle cx="271" cy="116" r="3" fill="#3a3230"/>
    <circle cx="253" cy="116" r="3" fill="#3a3230"/>
    <path d="M255 130 q7 6 16 0" stroke="#3a3230" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- チェックマーク -->
  <g>
    <circle cx="86" cy="106" r="26" fill="#dff0e6"/>
    <path d="M74 106 l9 9 l16 -18" stroke="#2f6f4f" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="128" cy="176" r="18" fill="#dff0e6"/>
    <path d="M120 176 l6 6 l11 -13" stroke="#2f6f4f" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="736" cy="200" r="26" fill="#dff0e6"/>
    <path d="M724 200 l9 9 l16 -18" stroke="#2f6f4f" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
