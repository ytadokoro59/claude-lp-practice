<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="屋根裏でかじられた配線と被害のイラスト">
  <rect width="800" height="340" fill="#5a4638"/>
  <!-- 木目の床板 -->
  <g fill="#6d5240">
    <rect x="0" y="0" width="800" height="66"/>
    <rect x="0" y="70" width="800" height="66"/>
    <rect x="0" y="140" width="800" height="66"/>
    <rect x="0" y="210" width="800" height="66"/>
    <rect x="0" y="280" width="800" height="60"/>
  </g>
  <g stroke="#5a4638" stroke-width="4">
    <line x1="0" y1="68" x2="800" y2="68"/><line x1="0" y1="138" x2="800" y2="138"/>
    <line x1="0" y1="208" x2="800" y2="208"/><line x1="0" y1="278" x2="800" y2="278"/>
    <line x1="200" y1="0" x2="200" y2="68"/><line x1="560" y1="70" x2="560" y2="138"/>
    <line x1="320" y1="140" x2="320" y2="208"/><line x1="660" y1="210" x2="660" y2="278"/>
  </g>
  <!-- 断熱材（めくれ） -->
  <g>
    <rect x="40" y="216" width="190" height="70" rx="16" fill="#f4b8c4"/>
    <path d="M230 216 q40 6 34 44 q-20 -8 -34 6 z" fill="#f9d3da"/>
    <g stroke="#e79aa9" stroke-width="4" stroke-linecap="round">
      <line x1="70" y1="232" x2="70" y2="270"/><line x1="104" y1="232" x2="104" y2="270"/>
      <line x1="138" y1="232" x2="138" y2="270"/><line x1="172" y1="232" x2="172" y2="270"/>
    </g>
  </g>
  <!-- 配線（かじられ断線） -->
  <g fill="none" stroke-linecap="round">
    <path d="M60 120 C180 96 300 150 388 128" stroke="#f0c040" stroke-width="18"/>
    <path d="M470 118 C580 96 690 140 760 118" stroke="#f0c040" stroke-width="18"/>
    <!-- 銅線露出 -->
    <g stroke="#d97b29" stroke-width="5">
      <path d="M388 128 l30 -6"/>
      <path d="M390 134 l28 2"/>
      <path d="M470 118 l-28 -2"/>
      <path d="M468 112 l-26 8"/>
    </g>
  </g>
  <!-- スパーク -->
  <g fill="#ffd23e">
    <polygon points="430,96 438,112 456,110 442,122 450,140 432,128 416,138 422,120 408,110 426,112"/>
  </g>
  <!-- かじりくず -->
  <g fill="#e8b84a" opacity="0.9">
    <circle cx="404" cy="152" r="4"/><circle cx="424" cy="158" r="3"/><circle cx="446" cy="150" r="3.5"/>
  </g>
  <!-- 糞（控えめ） -->
  <g fill="#3a3230">
    <ellipse cx="600" cy="240" rx="9" ry="4.5" transform="rotate(20 600 240)"/>
    <ellipse cx="624" cy="252" rx="9" ry="4.5" transform="rotate(-14 624 252)"/>
    <ellipse cx="648" cy="240" rx="9" ry="4.5" transform="rotate(8 648 240)"/>
  </g>
  <!-- 警告サイン -->
  <g>
    <polygon points="700,40 760,140 640,140" fill="#ffcc4d" stroke="#e6a817" stroke-width="5" stroke-linejoin="round"/>
    <rect x="694" y="72" width="12" height="36" rx="6" fill="#5a4638"/>
    <circle cx="700" cy="122" r="7" fill="#5a4638"/>
  </g>
</svg>
