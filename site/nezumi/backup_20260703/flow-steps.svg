<svg viewBox="0 0 400 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="相談から訪問日程調整までの6ステップ図">
  <defs>
    <linearGradient id="flowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ee"/>
      <stop offset="100%" stop-color="#dff0e6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="170" rx="16" fill="url(#flowBg)"/>

  <g transform="translate(0,38)">
    <!-- connecting line -->
    <line x1="40" y1="55" x2="360" y2="55" stroke="#cfe3d5" stroke-width="4"/>

    <!-- step nodes 1-6 in a single row -->
    <g font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      <circle cx="40"  cy="55" r="16" fill="#2f6f4f"/><text x="40"  y="60">1</text>
      <circle cx="104" cy="55" r="16" fill="#2f6f4f"/><text x="104" y="60">2</text>
      <circle cx="168" cy="55" r="16" fill="#2f6f4f"/><text x="168" y="60">3</text>
      <circle cx="232" cy="55" r="16" fill="#2f6f4f"/><text x="232" y="60">4</text>
      <circle cx="296" cy="55" r="16" fill="#2f6f4f"/><text x="296" y="60">5</text>
      <circle cx="360" cy="55" r="16" fill="#2f6f4f"/><text x="360" y="60">6</text>
    </g>

    <!-- simple icons above each step -->
    <g fill="none" stroke="#2f6f4f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <!-- 1: chat bubble -->
      <path d="M28 12 h24 a4 4 0 0 1 4 4 v10 a4 4 0 0 1 -4 4 h-12 l-7 6 v-6 h-5 a4 4 0 0 1 -4 -4 v-10 a4 4 0 0 1 4 -4 z"/>
      <!-- 2: document -->
      <rect x="94" y="12" width="20" height="24" rx="2"/>
      <line x1="98" y1="20" x2="110" y2="20"/>
      <line x1="98" y1="26" x2="110" y2="26"/>
      <!-- 3: phone/headset -->
      <path d="M158 14 a12 12 0 0 1 24 0 v6 a12 12 0 0 1 -3 8" />
      <rect x="156" y="20" width="6" height="10" rx="2" fill="#2f6f4f"/>
      <rect x="180" y="20" width="6" height="10" rx="2" fill="#2f6f4f"/>
      <!-- 4: calendar -->
      <rect x="220" y="13" width="24" height="22" rx="2"/>
      <line x1="220" y1="20" x2="244" y2="20"/>
      <line x1="227" y1="9" x2="227" y2="16"/>
      <line x1="237" y1="9" x2="237" y2="16"/>
      <!-- 5: magnifier -->
      <circle cx="291" cy="20" r="10"/>
      <line x1="298" y1="27" x2="306" y2="35"/>
      <!-- 6: check circle -->
      <circle cx="360" cy="22" r="12"/>
      <path d="M354 22 l4 4 8 -9"/>
    </g>
  </g>
</svg>
