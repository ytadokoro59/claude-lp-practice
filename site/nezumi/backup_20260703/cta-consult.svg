<svg viewBox="0 0 400 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="スマートフォンで相談して安心している人物のイメージ">
  <defs>
    <linearGradient id="ctaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd9b3"/>
      <stop offset="100%" stop-color="#ff9a4d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="170" rx="16" fill="url(#ctaBg)"/>

  <!-- house silhouette in background -->
  <polygon points="250,130 320,80 390,130" fill="#ffffff" opacity="0.35"/>
  <rect x="265" y="130" width="110" height="35" fill="#ffffff" opacity="0.35"/>

  <!-- person sitting -->
  <g transform="translate(50,50)">
    <circle cx="44" cy="18" r="20" fill="#fdf6ec"/>
    <rect x="16" y="38" width="56" height="60" rx="18" fill="#2f6f4f"/>
    <rect x="8" y="92" width="36" height="42" rx="13" fill="#234f38"/>
    <rect x="52" y="92" width="36" height="42" rx="13" fill="#234f38"/>
  </g>

  <!-- phone -->
  <g transform="translate(96,78)">
    <rect x="0" y="0" width="32" height="50" rx="6" fill="#ffffff"/>
    <circle cx="16" cy="43" r="2.6" fill="#2f6f4f"/>
  </g>

  <!-- speech bubble with check -->
  <g transform="translate(150,20)">
    <path d="M0 16 a16 16 0 0 1 16 -16 h60 a16 16 0 0 1 16 16 v22 a16 16 0 0 1 -16 16 h-38 l-14 12 v-12 h-8 a16 16 0 0 1 -16 -16 z" fill="#ffffff"/>
    <path d="M26 26 l9 9 17 -19" stroke="#2f6f4f" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
