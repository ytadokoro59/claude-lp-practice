<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="戸建て住宅の屋根裏とスマートフォンで相談するイメージ">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5fa37c"/>
      <stop offset="100%" stop-color="#234f38"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#heroBg)"/>

  <!-- house -->
  <rect x="80" y="100" width="170" height="80" fill="#fdf6ec"/>
  <polygon points="70,100 165,40 260,100" fill="#e8e0d2"/>

  <!-- attic check highlight -->
  <circle cx="165" cy="78" r="14" fill="#ffe9b8" opacity="0.9"/>
  <circle cx="165" cy="78" r="22" fill="none" stroke="#ffe9b8" stroke-width="2" stroke-dasharray="4 5" opacity="0.7"/>

  <!-- windows / door -->
  <rect x="100" y="125" width="26" height="26" fill="#bcd9c7"/>
  <rect x="204" y="125" width="26" height="26" fill="#bcd9c7"/>
  <rect x="150" y="142" width="32" height="38" fill="#bcd9c7"/>

  <!-- small mouse silhouette near roof edge (kept tiny) -->
  <g fill="#3a3a3a" opacity="0.45">
    <ellipse cx="245" cy="98" rx="8" ry="4.5"/>
    <circle cx="251" cy="95.5" r="2.2"/>
    <path d="M238 98 q-6 -3 -9 -1" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>
  </g>

  <!-- phone consultation icon -->
  <g transform="translate(285,118)">
    <rect x="0" y="0" width="56" height="74" rx="9" fill="#ffffff"/>
    <rect x="6" y="9" width="44" height="50" rx="4" fill="#eef4ee"/>
    <circle cx="28" cy="66" r="3.5" fill="#2f6f4f"/>
    <circle cx="28" cy="32" r="13" fill="#ff7a30"/>
    <path d="M22 32 l4.5 4.5 8 -8.5" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
